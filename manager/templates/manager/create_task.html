{% extends 'manager/base.html' %}
{% block title %}Create Task | TaskFlow Pro{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="auth-card glass">
        <div class="auth-header">
            <span class="badge">New Task</span>
            <h1>Create Task for {{ project.title }}</h1>
            <p>Add a task, set its status, priority and due date.</p>
        </div>

        <form method="post" class="form-grid">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-full">Create Task</button>
        </form>
    </div>
</section>
{% endblock %}
