{% extends 'manager/base.html' %}
{% block title %}Edit Task | TaskFlow Pro{% endblock %}

{% block content %}
<section class="auth-wrap">
    <div class="auth-card glass">
        <div class="auth-header">
            <span class="badge">Edit Task</span>
            <h1>Update Task</h1>
            <p>Modify task details, status, priority or due date.</p>
        </div>

        <form method="post" class="form-grid">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-full">Save Changes</button>
        </form>
    </div>
</section>
{% endblock %}
